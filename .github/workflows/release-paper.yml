name: Release Paper Plugin

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. paper-v1.0.0)'
        required: true
        default: 'paper-v1.0.0'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout paper branch
        uses: actions/checkout@v4
        with:
          ref: paper-1.21.11

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Create release with jar
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release upload "$TAG" build/libs/*.jar --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$TAG" build/libs/*.jar \
              --title "Amazing™ for Paper $TAG" \
              --notes "Server-side Paper 1.21.11 plugin edition. Drop the jar into plugins/ (Java 21+). For the city world, set \`generator: AmazingPaper\` in bukkit.yml. Full docs on the paper-1.21.11 branch." \
              --target "paper-1.21.11" \
              --repo "$GITHUB_REPOSITORY"
          fi
